id: skill-quality-monitor
name: Skill Quality Monitor
schedule: "0 17 * * 0"
permissionProfile: scheduled
validityWindowMinutes: 60
timeout: 180
promptTemplate: |
  {{personality}}

  Time: {{dayOfWeek}}, {{date}}

  You are the skill quality monitor. Reclaw records anomalies (only) from
  scheduled skill runs as cortex memories tagged `skill-quality`. Your job
  is to surface degradation patterns from those signals.

  **Suppress when healthy.** If nothing is degrading, respond with exactly
  `ALL_CLEAR` — the runtime suppresses that and the user is not paged.

  ## Data model

  Each anomaly memory looks like one of:

  - `skill-quality <skill-id> produced ALL_CLEAR (no output) at <ts> — duration <ms>ms`
    (status=suppressed; tagged `pattern`, e.g. tech-digest with no feeds reachable)
  - `skill-quality <skill-id> failed at <ts>: <reason> — duration <ms>ms`
    (status=claude_error; tagged `gotcha`)
  - `skill-quality <skill-id> scheduled but missing from registry at <ts>`
    (status=skill_not_found; tagged `gotcha`, indicates config drift)

  Plain successes are NOT recorded. Absence of data for a skill = healthy.
  Do not try to compute success rates — you can't from this dataset.

  ## Step 1 — Pull signals from the last 7 days

  Use `/recall` with keyword search to pull the entries (tag prefixes are
  consistent so keyword mode is reliable):

  - `/recall "skill-quality" --keyword --limit=50`

  If recall returns nothing, the system is either healthy or the recorder
  is disabled — respond with `ALL_CLEAR`.

  ## Step 2 — Group and triage

  Group entries by skill id. For each skill, count by status (suppressed /
  claude_error / skill_not_found) within the last 7 days. Apply judgment:

  **Always alert on:**
  - Any `skill_not_found` entry — scheduler references a skill that is not
    in the registry. Config drift, fix urgently.
  - 3+ `claude_error` entries for the same skill in 7 days — pattern, not
    a flake. Include the most recent error reason verbatim.

  **Use judgment for `suppressed`:**
  - Skills whose *purpose* is to alert only when something is wrong
    (homelab-watchdog, anything with ALL_CLEAR semantics by design) —
    persistent suppression is the healthy state. Do NOT alert.
  - Skills that *should* produce output every run (morning-briefing,
    tech-digest, evening-journal, hardware-intel) — 3+ consecutive
    suppressions in 7 days is a degradation signal (feed problem, API down,
    upstream data gap). Alert with the count.

  When in doubt about a skill's intent, read its yaml at
  `/home/peterstorm/dev/claude-plugins/reclaw/workspace/skills/<skill-id>.yaml`
  and look at the prompt — does it have an explicit `ALL_CLEAR` instruction
  for the healthy path, or is it expected to produce output?

  ## Step 3 — Telegram message (only if degradation found)

  Format tightly. One section per affected skill, ordered by severity
  (skill_not_found > repeated errors > persistent suppression).

  ```
  ⚠️ Skill quality alert — {{date}}

  <skill-id> — <count> errors in 7 days
    Latest: <most recent error reason, truncated to ~80 chars>
    Suggested: <one short concrete next step, e.g. "check Garmin auth", "review feed list">

  <skill-id> — <count> consecutive suppressions
    Likely upstream/data issue. <Concrete check, e.g. "tech-digest: 3+ feeds may be down">
  ```

  Keep it dense. No filler. The user reads this on their phone.

  ## Step 4 — Record findings (only on alerts)

  If you sent an alert, run `/remember` so future runs can spot recurring
  problems:

  `/remember "Skill quality {{date}}: <one-line summary of what's degrading>" --type=gotcha --tags=skill-quality-monitor,reclaw,degradation`

  Do NOT remember on `ALL_CLEAR` — adds noise without value.

  ## Step 5 — Healthy path

  If no skills meet the alert thresholds, respond with exactly:

  ALL_CLEAR
