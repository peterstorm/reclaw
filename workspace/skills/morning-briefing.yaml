id: morning-briefing
name: Morning Briefing
schedule: "20 7 * * 1-5"
permissionProfile: scheduled
validityWindowMinutes: 60
timeout: 300
promptTemplate: |
  {{personality}}

  Today is {{dayOfWeek}}, {{date}}.

  Please provide a personalized morning briefing. The user bikes to work at 07:30 from Mjøsensgade 13, 2300 København to Fadet 4, Carlsbergbyen (~4km).

  **Step 0 — Personal context:** Before anything else, check cortex memory for recent context:
  1. Run `/recall` with a broad query like "yesterday" or "recent conversations" to surface what the user talked about in the last day or two.
  2. Look for: ongoing projects, things they were stuck on, personal plans they mentioned, decisions they made, or anything emotionally relevant (excitement about something, frustrations, etc).
  3. Use this to craft a **warm, personal opening** — not a generic greeting. Reference something specific. Examples:
     - "Morning — you were deep in that multi-user isolation design yesterday, hope it clicked overnight."
     - "Happy Friday — you mentioned wanting to try that new restaurant this weekend, enjoy it if you do."
     - "Good morning — the calendar sync was giving you grief last time, looks like it's working now though."
  4. If cortex has nothing recent or relevant, fall back to a simple day-aware greeting that matches the energy of the day (Monday = fresh start, Wednesday = midweek, Friday = home stretch, etc).
  5. Keep it to 1-2 sentences max. Casual, not cheesy.

  **Step 1 — Commute weather:** Run this curl command to get hourly weather for the route:
  ```
  curl -s "https://api.open-meteo.com/v1/forecast?latitude=55.665&longitude=12.57&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,wind_speed_10m,wind_gusts_10m,weather_code&timezone=Europe/Copenhagen&forecast_days=1"
  ```
  From the JSON response, extract the 07:00 and 08:00 hours and summarize:
  - Temperature and feels-like
  - Rain probability and expected mm
  - Wind speed and gusts
  - Clear recommendation: what to wear, whether to bring rain gear

  **Step 2 — Fitness:** Fetch today's Garmin data (this gets last night's sleep, this morning's readiness, and today's scheduled workouts):
  ```
  bun /home/peterstorm/dev/claude-plugins/reclaw/scripts/garmin-fetch.ts {{date}}
  ```
  Then read the result:
  ```
  cat ~/.cache/garmin/daily/{{date}}.json 2>/dev/null
  ```
  Also read yesterday's data for steps and activity summaries:
  ```
  cat ~/.cache/garmin/latest.json 2>/dev/null
  ```

  From today's fetch, include a compact fitness block (4-5 lines max):
  - Last night's sleep: score and duration (e.g. "Sleep: 7h42m (score 81)")
  - Training readiness: score and level (e.g. "Readiness: 60/100 (Moderate)")
  - Resting HR (from today's data) and trend if notable (e.g. "RHR: 52 bpm — stable")
  From yesterday's data (latest.json):
  - Yesterday's steps
  - If there was an activity yesterday: one-line summary (e.g. "5k run: 5:12/km avg, zone 2")
  - Training status if available (e.g. "Training: Productive, VO2 max 52.3")

  If fetch fails or data is missing, skip this section silently.

  **Step 2b — Today's scheduled workouts:** From today's fetch above, check scheduledWorkouts.
  If there are scheduled workouts, include them in a compact block:
  - Workout name and sport type
  - Description (the actual workout structure, e.g. "3km at 6:00/km → 3km at 5:50/km → 3km at 5:40/km → 2km easy")
  - Provider if available (e.g. Runna)
  - Frame it against the training readiness: if readiness is low, note it (e.g. "Readiness is 51 — listen to your body on those progression paces")
  If no scheduled workouts, skip this section silently.

  **Step 3 — Calendar:** Read today's events from the shared "J & P" iCloud calendar:
  - Calendar directory: ~/.local/share/calendars/icloud/D8C2180E-3AD0-406E-9B55-23DA5F2CC674/
  - Each .ics file is an event
  - Parse the VEVENT blocks: look for DTSTART/DTEND matching today ({{date}})
  - For recurring events (RRULE), check if today matches the recurrence pattern
  - List each event with: time, title (SUMMARY), location (LOCATION if present)
  - Flag any early morning meetings that would affect the 07:30 commute
  - If no calendar files exist yet, just note that calendar sync is pending

  **Step 4 — Day overview:** Include:
  - The calendar events from step 2
  - Key priorities or tasks from the Obsidian vault
  - Any open items from the reclaw todo at ~/dev/notes/remotevault/reclaw/todo.md

  Lead with the commute weather. Be concise and actionable.
