id: evening-journal
name: Evening Report
schedule: "0 21 * * *"
permissionProfile: scheduled
validityWindowMinutes: 60
timeout: 300
promptTemplate: |
  {{personality}}

  Today is {{dayOfWeek}}, {{date}}.

  You are sending the evening report. This has three parts: a day recap, a tomorrow preview, and a journal prompt the user can reply to.

  ## Part 1 — Day Recap

  Gather context about what happened today, then present a concise summary.

  **Cortex memory:**
  Run `/recall` with queries like "today", "{{date}}", and "recent" to surface conversations, decisions, and activities from today.

  **Git activity (via GitHub API):**
  First, find repos pushed today:
  ```
  gh api "user/repos?sort=pushed&per_page=10&type=owner" --jq '.[] | select(.pushed_at >= "{{date}}") | .name'
  ```
  Then for each repo with recent pushes, get today's **default branch** commits:
  ```
  gh api "repos/peterstorm/REPO/commits?since=$(date -d '00:00' --iso-8601=seconds)&per_page=10" --jq '.[] | "\(.sha[0:7]) \(.commit.message | split("\n")[0])"'
  ```
  Also check for **open PR branch** commits (captures unmerged work-in-progress):
  ```
  gh api "repos/peterstorm/REPO/pulls?state=open&per_page=10" --jq '.[] | "#\(.number) \(.title)"'
  ```
  For each open PR, get today's commits:
  ```
  gh api "repos/peterstorm/REPO/pulls/PR_NUMBER/commits?per_page=100" --jq '.[] | select(.commit.author.date >= "{{date}}") | "\(.sha[0:7]) \(.commit.message | split("\n")[0])"'
  ```

  **Calendar events (today):**
  ```
  bun /home/peterstorm/dev/claude-plugins/reclaw/scripts/calendar-events.ts {{date}}
  ```

  **Present the recap:**
  Summarize the day in 3-5 bullet points covering what actually happened — coding work, meetings, decisions, anything notable. Be specific, not generic. If it was a quiet day, say so briefly.

  ## Part 2 — Tomorrow Preview

  **Calculate tomorrow's date** from {{date}} and use it for all lookups below.

  **Tomorrow's calendar:**
  Compute tomorrow's date from {{date}}, then:
  ```
  bun /home/peterstorm/dev/claude-plugins/reclaw/scripts/calendar-events.ts YYYY-MM-DD
  ```
  (replace YYYY-MM-DD with tomorrow's date). List each with time and title. If empty, say "Calendar is clear."

  **Commute weather (weekdays only):**
  If tomorrow is a weekday (Mon-Fri), fetch the forecast:
  ```
  curl -s "https://api.open-meteo.com/v1/forecast?latitude=55.665&longitude=12.57&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,wind_speed_10m,wind_gusts_10m,weather_code&timezone=Europe/Copenhagen&forecast_days=2"
  ```
  From the response, find tomorrow's 07:00 and 08:00 data and give a one-line commute forecast: temperature, rain risk, wind. Include a clothing/gear recommendation if relevant (rain gear, extra layers, etc).

  Skip the commute weather on weekends — just mention the general weather if interesting (storms, heatwave, etc).

  **Open tasks:**
  Check `~/dev/notes/remotevault/reclaw/todo.md` for any outstanding items worth flagging.

  ## Part 3 — Journal Prompt

  After the report, ask ONE open-ended journaling question tailored to the day's context.

  **Good question styles (rotate, don't repeat):**
  - "What's one thing from today you want to remember?"
  - "Anything unfinished that's on your mind?"
  - "What was the best part of today?"
  - "Did anything surprise you today?"
  - "What would you do differently if you could redo today?"
  - If heavy coding day: "Did you solve anything satisfying today?"
  - If calendar was busy: "Which conversation stuck with you?"
  - If it seems quiet: "How are you feeling about things right now?"

  Check cortex for recent journal prompts to avoid repeating. Store the question via `/remember`: "Journal prompt {{date}}: [question summary]"

  End by telling them they can swipe-reply to journal.

  ## Output Format

  This is a Telegram message — keep it readable but not bloated. Use this structure:

  ```
  [Warm 1-sentence opener referencing something from the day]

  📋 Today
  • [bullet 1]
  • [bullet 2]
  • [bullet 3]

  📅 Tomorrow
  • [calendar events or "Clear calendar"]
  • [commute weather one-liner, weekdays only]
  • [any flagged tasks]

  💭 [Journal question]

  Swipe-reply and I'll log it to your daily note.
  ```

  Keep it tight — aim for a message that reads in 15-20 seconds.
