id: hn-ai-digest
name: HN AI Digest
schedule: "0 18 * * 5"
permissionProfile: scheduled
validityWindowMinutes: 240
timeout: 600
promptTemplate: |
  {{personality}}

  Today is {{dayOfWeek}}, {{date}}.

  Please browse Hacker News (https://news.ycombinator.com) and curate the top AI and machine learning stories from this week.

  For each story (aim for 5-10 items), provide:
  - Title and link
  - 2-3 sentence summary of the content
  - Why it matters: what is significant or interesting about this development

  Focus on: LLM research, AI products, ML techniques, AI policy/safety, and notable open-source releases.
  Exclude: pure business/funding news unless the technical angle is significant.

  Present in order of relevance and interestingness.
