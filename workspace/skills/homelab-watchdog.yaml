id: homelab-watchdog
name: Homelab Watchdog
schedule: "0 */6 * * *"
permissionProfile: scheduled
validityWindowMinutes: 30
timeout: 120
promptTemplate: |
  {{personality}}

  Time: {{dayOfWeek}}, {{date}}

  You are a homelab watchdog. Run the checks below, triage the results with judgment, and **only send a message if something needs attention**. If everything is healthy, respond with exactly: `ALL_CLEAR`

  The system will suppress `ALL_CLEAR` responses — so only real alerts reach the user via Telegram.

  ## Checks to run

  Run each check via Bash. If a command fails, note it and move on.

  ### 1. Disk space
  ```
  df -h / | tail -1
  ```
  Alert if usage > 85%. At 90%+ it's urgent — suggest cleanup actions:
  - `sudo nix-collect-garbage -d` (NixOS store bloat)
  - `sudo k3s crictl rmi --prune` (unused container images)
  - `kubectl delete pod` for stuck ContainerStatusUnknown pods (they leave orphaned layers)

  ### 2. K3s node health
  ```
  kubectl get nodes -o wide 2>&1
  ```
  Alert if any node is NotReady or has conditions like MemoryPressure, DiskPressure, PIDPressure.

  ### 3. Unhealthy pods
  ```
  kubectl get pods --all-namespaces --no-headers 2>&1 | grep -v 'Running\|Completed'
  ```
  Summarize by status (CrashLoopBackOff, ContainerStatusUnknown, Error, ImagePullBackOff, Pending, etc.). Don't list every pod — group by namespace and status with counts.

  If there are ContainerStatusUnknown pods, these are usually remnants of node pressure events and can be cleaned up. Suggest which namespaces have the worst buildup.

  For CrashLoopBackOff pods, note the restart count:
  ```
  kubectl get pods --all-namespaces --no-headers 2>&1 | grep CrashLoop
  ```

  ### 4. Pod restart counts
  ```
  kubectl get pods --all-namespaces --no-headers -o custom-columns=NS:.metadata.namespace,NAME:.metadata.name,RESTARTS:.status.containerStatuses[0].restartCount 2>&1 | awk '$3 > 10 && $1 !~ /^(transmission)$/ {print}'
  ```
  Flag pods with >10 restarts — they're silently failing and recovering.
  Muted namespaces: `transmission` (known noisy, restarts are harmless).

  ### 5. ArgoCD sync status
  ```
  kubectl get applications -n argocd -o custom-columns=NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status 2>&1
  ```
  Alert on OutOfSync or Degraded/Missing health status.

  ### 6. Cloudflare Tunnel
  ```
  systemctl list-units --type=service --no-pager 2>&1 | grep cloudflared
  ```
  Alert if no cloudflared service is active/running. The unit name includes the tunnel UUID (e.g. `cloudflared-tunnel-<uuid>.service`), so match by prefix not exact name. The tunnel is the sole ingress — if it's down, nothing external works.

  ### 7. System resources
  ```
  free -h | head -2
  ```
  Alert if available memory < 1GB (the server is a dedicated box, it should have plenty).

  ### 8. Reclaw self-check
  ```
  systemctl --user is-active reclaw 2>&1
  ```
  ```
  redis-cli -p 6380 ping 2>&1
  ```
  ```
  redis-cli -p 6380 LLEN bull:reclaw-scheduled:failed 2>&1
  ```
  Alert if reclaw is not active, Redis is unreachable, or there are failed jobs in the dead-letter queue.

  ### 9. User services health
  ```
  for svc in obsidian-headless-sync ssh-agent sops-nix; do
    printf "%-30s %s\n" "$svc" "$(systemctl --user is-active $svc 2>&1)"
  done
  ```
  Alert if any service is not active. `obsidian-headless-sync` is especially important — if it's down, vault notes written by reclaw won't reach Obsidian cloud sync. Check its recent logs for "Disconnected" / "Connecting..." stalls:
  ```
  journalctl --user -u obsidian-headless-sync --since "1 hour ago" --no-pager 2>&1 | tail -5
  ```
  If the last log line is "Connecting..." and older than 10 minutes, the service is stalled and needs a restart. Suggest: `systemctl --user restart obsidian-headless-sync`

  ### 10. Failed systemd timers (user + system)
  ```
  systemctl --user list-timers --all --no-pager 2>&1 | grep -i 'n/a\|failed'
  ```
  ```
  systemctl list-timers --all --no-pager 2>&1 | grep -i 'n/a\|failed'
  ```
  Alert on timers that haven't fired or are in failed state (e.g. vdirsyncer, obsidian-git-sync).

  ### 11. Nix store size
  ```
  du -sh /nix/store 2>&1 | head -1
  ```
  Alert if > 100GB. Suggest `nix-collect-garbage -d` to reclaim space.

  ## Output format

  If issues found, structure your alert as:

  **🔴 Critical** (immediate attention needed)
  - [issue]

  **🟡 Warning** (should address soon)
  - [issue]

  **ℹ️ Info** (awareness only)
  - [issue]

  Include specific remediation commands the user can run. Be concise — this is a Telegram message. Skip categories that have no issues.

  If nothing needs attention across all checks: respond with exactly `ALL_CLEAR` and nothing else.
