id: vault-review
name: Vault Review
schedule: "0 9,12,17,20 * * *"
permissionProfile: scheduled
validityWindowMinutes: 30
timeout: 120
promptTemplate: |
  {{personality}}

  Today is {{dayOfWeek}}, {{date}}.

  You are running a spaced repetition review. Pick ONE note from the Obsidian vault that is due for review, present its key information, and prompt a lightweight reflection.

  ## Step 1 — Find a note to review

  Scan these vault folders for markdown files:
  ```
  find ~/dev/notes/remotevault/{learning,programming,languages,homelab,business,reading,work,reclaw/research} -name '*.md' -type f 2>/dev/null
  ```

  Do NOT scan `personal/`, `archive/`, or `reclaw/` operational docs (only `reclaw/research/`).

  ## Step 2 — Select the most overdue note

  Read the frontmatter of candidate notes. Look for these SRS fields:
  ```yaml
  srs_last_reviewed: "2026-02-28"
  srs_interval_days: 3
  srs_next_review: "2026-03-03"
  ```

  **Selection priority:**
  1. Notes with `srs_next_review` in the past (most overdue first)
  2. Notes with NO SRS fields at all (never reviewed — treat as maximally overdue)
  3. If multiple are tied, pick randomly among them

  Skip notes that are just indexes, MOCs (Maps of Content), or have fewer than 3 lines of actual content.

  Read files in batches — `find` first, then read frontmatter of ~20 candidates at a time until you find one that's due.

  ## Step 3 — Read the full note

  Read the entire content of the selected note. Understand its concepts deeply.

  ## Step 4 — Summarize the key information

  Distill the note into a concise review card. Include:
  - **Core concept** — what this is about in 1-2 sentences
  - **Key points** — 2-4 bullet points covering the most important takeaways
  - **Connections** — if relevant, mention how it relates to other concepts the user works with (programming, homelab, business, etc.)

  Keep it scannable — the user should be able to absorb this in 30 seconds.

  ## Step 5 — Ask a reflection question

  End with ONE lightweight reflection prompt. Not a test — just something to nudge active thinking. Good formats:
  - "How does this connect to what you're working on right now?"
  - "When did you last use this? Would you approach it differently now?"
  - "Rate your confidence with this 1-3 — anything feel fuzzy?"
  - "What would you explain differently to a junior dev?"
  - "Any part of this surprise you or feel outdated?"

  Pick whichever style fits the note's content best. The question should feel natural, not forced.

  ## Step 6 — Update frontmatter with SRS data

  Use the Write tool to update the note's frontmatter with new SRS fields.

  **Interval progression:** 1 → 3 → 7 → 14 → 30 → 60 (cap at 60 days).

  - If the note had NO SRS fields: set `srs_interval_days: 1`
  - If it had existing fields: advance to the next interval in the progression
  - Set `srs_last_reviewed` to today's date
  - Calculate `srs_next_review` by adding the interval to today

  When updating, preserve ALL existing frontmatter — only add/update the three `srs_*` fields.

  **Important:** If the note has no frontmatter block yet, add one at the top of the file.

  ## Step 7 — Store review context in cortex

  Run `/remember` to store a brief note: "Reviewed [note title] on [date] — key topics: [brief summary]". This lets the chat handler have context if the user replies with reflections.

  ## Output format

  Format your response as:

  🔄 Vault Review — [Note Title]

  [Core concept summary]

  • [Key point 1]
  • [Key point 2]
  • [Key point 3]

  💭 [Reflection question]
