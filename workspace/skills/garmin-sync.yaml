id: garmin-sync
name: Garmin Daily Sync
schedule: "0 22 * * *"
permissionProfile: scheduled
validityWindowMinutes: 60
timeout: 300
promptTemplate: |
  {{personality}}

  Today is {{dayOfWeek}}, {{date}}.

  You are syncing daily fitness data from Garmin Connect and writing it to the Obsidian vault.

  ## Step 1 — Fetch Garmin data

  Run the Garmin fetch script with today's date (this runs at 22:00, capturing the full day including evening activities):
  ```
  bun /home/peterstorm/dev/claude-plugins/reclaw/scripts/garmin-fetch.ts {{date}}
  ```

  If it fails with an auth error, report the failure and stop — don't write a vault note with no data.
  If it fails on individual metrics (partial failure), continue — the JSON will have nulls for missing sections.

  ## Step 2 — Parse the data

  The script outputs JSON to stdout. Parse it and extract:
  - `date` — the date this data covers (today, since the sync runs at 22:00)
  - `sleep` — score, duration, deep/light/REM/awake stages
  - `steps` — step count
  - `heartRate` — resting, max, min
  - `activities` — list of activities with type, duration, distance, HR, pace, training effect, HR zones, splits, hrTimeSeries, perceivedExertion (0-100 scale, display as 1-10), feelScore (1-5: awful to amazing)
  - `vo2Max` — running and cycling VO2 max values
  - `trainingStatus` — current training status and related metrics
  - `trainingReadiness` — score (0-100), level, sleepScore, recoveryTime (hours), hrvStatus
  - `hrv` — heart rate variability (weekly avg and last night)
  - `scheduledWorkouts` — workouts scheduled for the day (title, description with workout structure, steps with pace targets, provider). May be empty.
  - `errors` — any fetch failures (note them but don't let them block the vault note)

  Each activity includes `hrTimeSeries` — array of `{timestamp, heartRate}` points sampled throughout the activity (up to 1000 points). Use for interval analysis.

  ## Step 3 — Check for recent fitness notes

  Look for the last 5 fitness notes for trend comparison:
  ```
  ls -t ~/dev/notes/remotevault/personal/fitness/ 2>/dev/null | head -10
  ```
  If the fitness directory uses year/month structure, also check:
  ```
  find ~/dev/notes/remotevault/personal/fitness/ -name "*.md" -not -name "MOC.md" | sort -r | head -5
  ```

  Read the most recent 3 notes (if they exist) to extract recent metrics for comparison.

  ## Step 3.5 — Check if today's note already exists

  Check if the target note already exists at `~/dev/notes/remotevault/personal/fitness/YYYY/MM/YYYY-MM-DD.md`.
  If it does, respond with `ALL_CLEAR` and stop — the day has already been synced.

  ## Step 4 — Write the daily fitness note

  Create the note at: `~/dev/notes/remotevault/personal/fitness/YYYY/MM/YYYY-MM-DD.md`
  where YYYY-MM-DD is the **data date** (yesterday), not today.
  Create year/month directories if needed.

  **Frontmatter:**
  ```yaml
  ---
  title: "Fitness — YYYY-MM-DD"
  date: YYYY-MM-DD
  tags: [fitness, garmin, daily]
  up: "[[personal/fitness/MOC|Fitness]]"
  ---
  ```

  **Note structure:**

  ### Overview
  A quick-glance summary table:
  | Metric | Value |
  |--------|-------|
  | Steps | X,XXX |
  | Resting HR | XX bpm |
  | Sleep Score | XX/100 |
  | Sleep Duration | Xh XXm |
  | VO2 Max | XX.X |
  | Training Status | [status] |
  | HRV | XX ms |
  | Training Readiness | XX/100 ([level]) |

  Skip any row where the data is null.

  ### Sleep
  - Score, total duration
  - Stage breakdown: deep, light, REM, awake — both duration and percentage
  - Brief comparison to recent notes if available (e.g. "sleep score trending up this week")

  ### Training Readiness
  If trainingReadiness data exists:
  - Overall readiness score and level
  - Sleep score component (from readiness, not the separate sleep section)
  - Recovery time remaining (hours)
  - HRV status

  Brief interpretation: was the body ready for training? If a run was done, note whether the readiness score supported the effort level.

  ### Scheduled Workouts
  If scheduledWorkouts is non-empty, list them. Note whether each was completed (matching activity exists) or missed.
  If empty, skip this section.

  ### Activities
  For each activity logged that day:
  - Type, name, duration, distance
  - Average/max HR, HR zone time distribution
  - Calories, elevation gain (if applicable)
  - Training effect (aerobic + anaerobic)
  - Perceived exertion (show as X/10 from the 0-100 raw value) and feel (1-5 scale) if present

  **If there are running activities, add a detailed Run Analysis subsection:**

  #### Run Analysis
  - **Pre-run readiness**: If trainingReadiness data exists, summarize the body's state going into the run — readiness score, sleep quality, recovery time, HRV status. Frame the run performance in this context (e.g. "solid effort despite low readiness of 38" or "good conditions — readiness was 72 with full recovery")
  - **Pace**: Overall average pace (min/km), and per-km splits if available
  - **HR zones**: Time in each zone — was it an easy run, tempo, threshold, or intervals?
  - **HR timeline**: If hrTimeSeries data exists, analyze HR progression through the run:
    - For **intervals**: identify work/rest segments by HR spikes and valleys. Report peak HR during intervals, recovery HR between intervals, and recovery speed (how quickly HR drops)
    - For **steady runs**: report HR drift — did HR climb significantly at the same pace? (cardiac drift > 5% suggests fatigue or dehydration)
    - For **any run**: note warm-up HR ramp, peak HR and when it occurred, and cooldown pattern
  - **Aerobic efficiency**: Pace vs HR ratio — lower HR for same pace = better fitness
  - **Cadence**: Steps per minute if available
  - **Training effect**: Aerobic and anaerobic values and what they indicate
  - **VO2 max impact**: Did this run contribute to VO2 max estimation?
  - **Trend comparison**: Compare pace, HR, and efficiency to recent runs from previous fitness notes:
    - Is pace improving at the same HR? (aerobic development)
    - Is HR drift increasing during runs? (potential fatigue)
    - Are training effects appropriate for the training phase?
  - **Commentary**: Comprehensive, honest training analysis — don't hold back on detail:
    - Classify the run type based on HR zones and pace (easy/recovery, tempo, threshold, intervals, long run)
    - Evaluate whether the effort matched the likely training intent — e.g. was an "easy run" actually easy? Did HR stay in zone 2?
    - Assess aerobic development: is pace improving at the same HR over weeks? Calculate and compare pace:HR ratios across recent runs
    - Flag fatigue signals: elevated resting HR, declining HRV, increasing HR drift during runs, or worsening pace:HR ratio
    - If consecutive hard days (high training effect or zone 4-5 time): recommend recovery and explain why
    - If training status is "Unproductive", "Overreaching", or "Detraining": explain what it means and suggest corrective action
    - Note positive trends explicitly — fitness gains deserve recognition (e.g. "VO2 max up 0.5 over 2 weeks", "aerobic efficiency improving")
    - Consider the weekly training load balance: too much intensity? Not enough volume? Good mix?
    - If sleep score or HRV is notably poor, connect it to training context (recovery debt, potential illness, life stress)
    - If training readiness was low but the run was still strong — note the resilience but flag recovery cost
    - If training readiness was high and performance was poor — flag possible external factors (nutrition, hydration, weather)
    - **Subjective effort vs objective data**: If perceivedExertion or feelScore is present, compare them against what the HR/pace data shows. A high RPE with low HR could indicate fatigue, poor sleep, or heat; a low RPE with high HR suggests strong fitness or flow state. If feel was poor (1-2) despite decent metrics, flag possible external stressors. If feel was great (4-5) with strong data, highlight the positive session quality. These subjective signals are valuable context that pure metrics miss.
    - Suggest what the next run should look like based on current recovery state and recent training load

  If there are no activities, skip the Activities section entirely — don't include an empty heading.

  ### Training Status
  - Current status (Productive, Maintaining, Detraining, Peaking, Recovery, etc.)
  - VO2 max (running + cycling if available) with trend vs recent notes
  - HRV weekly average and last night value

  ## Step 5 — Maintain the Fitness MOC

  Check if `~/dev/notes/remotevault/personal/fitness/MOC.md` exists.
  If not, create it:
  ```yaml
  ---
  title: Fitness
  tags: [moc, fitness, garmin]
  up: "[[personal/MOC]]"
  ---
  ```
  ```
  # Fitness

  Daily fitness tracking from Garmin Connect.

  ## Daily Notes
  ```

  Append a link to today's note:
  `- [[personal/fitness/YYYY/MM/YYYY-MM-DD|YYYY-MM-DD]] — [1-line summary]`

  The 1-line summary should be like: "8.2k steps, 7h12m sleep (82), 5k run 5:15/km"

  ## Step 6 — Store in cortex

  Run `/remember`: "Fitness [date]: [concise summary of key metrics and any notable activities or trends]"

  ## Output

  Respond with exactly `ALL_CLEAR` — this is a background data sync, not a user-facing notification.
