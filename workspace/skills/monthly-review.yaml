id: monthly-review
name: Monthly Review
schedule: "0 10 1 * *"
permissionProfile: scheduled
validityWindowMinutes: 120
timeout: 240
promptTemplate: |
  {{personality}}

  Today is {{dayOfWeek}}, {{date}}.

  Generate a monthly review for the previous month. Synthesize weekly reviews, journal entries, and activity into a higher-level retrospective. Write it to an Obsidian note and send a Telegram summary.

  ## Step 1 — Gather the month's data

  **Weekly reviews:**
  Read all weekly review notes from the previous month:
  ```
  ls ~/dev/notes/remotevault/personal/journal/weekly/ 2>/dev/null
  ```
  Read each one that falls within the previous month.

  **Journal entries:**
  Read daily journal notes from the previous month:
  ```
  ls ~/dev/notes/remotevault/personal/journal/ 2>/dev/null | grep '\.md$'
  ```
  Filter by filename date for the previous month.

  **Cortex memory:**
  Run `/recall` with queries: "last month", "shipped", "decision", "milestone", "learned", "struggle" to surface key events.

  **Git activity (via GitHub API):**
  The user codes on a local machine and pushes to GitHub — check there for the authoritative commit history.

  Find repos pushed in the last month:
  ```
  gh api "user/repos?sort=pushed&per_page=30&type=owner" --jq --arg cutoff "$(date -d '1 month ago' --iso-8601=seconds)" '.[] | select(.pushed_at >= $cutoff) | .name'
  ```
  Then for each active repo, get the month's commits:
  ```
  gh api "repos/peterstorm/REPO/commits?since=$(date -d '1 month ago' --iso-8601=seconds)&per_page=50" --jq '.[] | "\(.sha[0:7]) \(.commit.message | split("\n")[0])"'
  ```
  Run the second command for each repo found in the first step. Group results by repo name in your summary.

  ## Step 2 — Write the monthly review note

  Create a note at: `~/dev/notes/remotevault/personal/journal/monthly/YYYY-MM.md` (e.g. `2026-02.md`)
  Create the `personal/journal/monthly/` directory if it doesn't exist.

  **Frontmatter:**
  ```yaml
  ---
  title: "Monthly Review — Month YYYY"
  date: YYYY-MM-DD
  tags: [journal, monthly-review]
  up: "[[personal/journal/MOC]]"
  ---
  ```

  **Sections:**
  - `## Month at a glance` — 1 paragraph narrative summary of the month
  - `## Key accomplishments` — 5-8 concrete things shipped/completed/achieved
  - `## Projects` — status of each active project (reclaw, dotfiles, work projects, learning goals). What moved, what stalled.
  - `## Learning & growth` — new skills, concepts explored, vault quiz patterns, books/articles
  - `## Reflections` — what worked well this month, what didn't, energy levels, any shifts in priorities or interests
  - `## Goals for next month` — 3-5 specific, actionable items based on carry-forward work and emerging interests

  This should read like a personal retrospective, not a changelog. Synthesize and reflect — don't just list.

  ## Step 3 — Store in cortex

  Run `/remember`: "Monthly review {{date}}: [3-sentence summary of the month]"

  ## Step 4 — Send Telegram summary

  **Format:**
  ```
  📊 Monthly Review — [Month YYYY]

  [1-paragraph narrative: what defined this month]

  Top accomplishments:
  • [item 1]
  • [item 2]
  • [item 3]

  Focus for next month:
  • [goal 1]
  • [goal 2]

  Full review saved to vault. Swipe-reply to discuss.
  ```
